name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clone repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: 🔍 Lint (optional)
        run: npm run lint || echo "⚠️ no lint script"

      - name: 🧪 Tests (optional)
        run: npm test || echo "⚠️ no tests"

      - name: 🏗 Build (optional)
        run: npm run build || echo "⚠️ no build step"

      - name: 📊 Show Node version
        run: node -v
        